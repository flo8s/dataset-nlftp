name = "nlftp"
command = "python main.py"

[targets.default]
url = "s3://${FDL_S3_BUCKET}"
public_url = "https://data.queria.io"
s3_endpoint = "${FDL_S3_ENDPOINT}"
s3_access_key_id = "${FDL_S3_ACCESS_KEY_ID}"
s3_secret_access_key = "${FDL_S3_SECRET_ACCESS_KEY}"

[targets.local]
url = "~/.local/share/fdl"
public_url = "http://localhost:4001"

[meta]
license = "国土数値情報利用規約"
license_url = "https://nlftp.mlit.go.jp/ksj/other/yakkan.html"
title = "国土数値情報"
description = """国土交通省「国土数値情報ダウンロードサイト」(nlftp.mlit.go.jp) から取得した GIS データ。
地形、土地利用、公共施設などの国土に関する基礎的な情報を提供。"""
cover = "🗾"
tags = ['GIS', '国土数値情報', '境界', '行政区域', '人口', '将来推計人口', '鉄道', '駅', '医療機関', '施設']
source_url = "https://nlftp.mlit.go.jp/"
repository_url = "https://github.com/flo8s/dataset-nlftp"

[meta.schemas]
boundary.title = "行政区域境界データ"
population.title = "将来推計人口"
railway.title = "鉄道"
facility.title = "施設"
