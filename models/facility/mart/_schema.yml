version: 2

_meta: &meta
  source_url: "https://nlftp.mlit.go.jp/ksj/gml/datalist/KsjTmplt-P04-v3_0.html"
  published: true
  tags: ["国土数値情報", "医療機関", "施設", "GIS"]

models:
  - name: medical_institution
    description: |
      医療機関の位置（ポイント）。病院・診療所・歯科診療所の名称・所在地・診療科目・病床数・
      開設者分類を持つ。国土数値情報 P04（第3.0版・令和2年）。
    access: public
    config:
      meta:
        <<: *meta
        title: "医療機関"
    columns:
      - name: medical_class_code
        meta:
          title: 医療機関分類コード
          description: P04_001（病院=1、診療所=2、歯科診療所=3）
      - name: medical_class
        meta:
          title: 医療機関分類
      - name: institution_name
        meta:
          title: 施設名称
      - name: address
        meta:
          title: 所在地
      - name: departments
        meta:
          title: 診療科目
          description: 当該施設が有する診療科目（全角空白区切り）
      - name: establisher_type_code
        meta:
          title: 開設者分類コード
          description: P04_007（国=1、公的医療機関=2、社会保険関係団体=3、医療法人=4、個人=5、その他=6、分類対象外=9）。病院のみ分類対象
      - name: establisher_type
        meta:
          title: 開設者分類
      - name: bed_count
        meta:
          title: 病床数
          description: P04_008。当該施設が有する病床総数
      - name: emergency_hospital
        meta:
          title: 救急告示病院
          description: P04_009（指定あり／指定なし）
      - name: disaster_base_hospital
        meta:
          title: 災害拠点病院
          description: P04_010（基幹災害拠点病院／地域災害拠点病院／指定なし）
      - name: geometry
        meta:
          title: 医療機関ポイント
          description: "CRS: EPSG:6668 (JGD2011)"

  - name: school
    description: |
      学校の位置（ポイント）。小学校・中学校・高等学校・大学・幼稚園・特別支援学校・
      認定こども園・専修学校等の名称・所在地・学校分類・管理者を持つ。
      国土数値情報 P29（第2.0版・令和3年）。
    access: public
    config:
      meta:
        <<: *meta
        title: "学校"
    columns:
      - name: admin_code
        meta:
          title: 行政区域コード
          description: P29_001。都道府県コードと市区町村コードからなる、学校が存在する行政区を特定するコード
      - name: school_code
        meta:
          title: 学校コード
          description: P29_002。全国の学校に設定された固有コード
      - name: school_class_code
        meta:
          title: 学校分類コード
          description: P29_003（小学校=16001、中学校=16002、中等教育学校=16003、高等学校=16004、高等専門学校=16005、短期大学=16006、大学=16007、幼稚園=16011、特別支援学校=16012、認定こども園=16013、義務教育学校=16014、各種学校=16015、専修学校=16016）
      - name: school_class
        meta:
          title: 学校分類
      - name: school_name
        meta:
          title: 名称
          description: 学校の正式名称
      - name: address
        meta:
          title: 所在地
          description: P29_005。市区町村名を省いた所在地
      - name: administrator_code
        meta:
          title: 管理者コード
          description: P29_006（その他=0、国=1、都道府県=2、市区町村=3、民間=4）
      - name: administrator
        meta:
          title: 管理者
      - name: school_status_code
        meta:
          title: 休校区分コード
          description: P29_007（調査なし=0、開校中=1、休校中=2）
      - name: school_status
        meta:
          title: 休校区分
      - name: geometry
        meta:
          title: 学校ポイント
          description: "CRS: EPSG:6668 (JGD2011)"

  - name: welfare
    description: |
      福祉施設の位置（ポイント）。保護施設・老人福祉施設・障害者支援施設・
      身体障害者社会参加支援施設・児童福祉施設・母子父子福祉施設等の名称・所在地・
      分類（大／中／小）・管理者を持つ。国土数値情報 P14（第2.1版・令和3年度）。
      一部の都道府県・市区町村は利用規約と異なる利用条件が付されているため、
      商用等で利用する際は提供元の利用制限を確認すること。
    access: public
    config:
      meta:
        <<: *meta
        source_url: "https://nlftp.mlit.go.jp/ksj/gml/datalist/KsjTmplt-P14-v2_1.html"
        tags: ["国土数値情報", "福祉施設", "施設", "GIS"]
        title: "福祉施設"
    columns:
      - name: prefecture
        meta:
          title: 都道府県名
          description: P14_001。当該施設が所在する都道府県名
      - name: city
        meta:
          title: 市区町村名
          description: P14_002。当該施設が所在する市区町村名
      - name: admin_code
        meta:
          title: 行政区域コード
          description: P14_003。当該施設が所在する行政区域コード
      - name: address
        meta:
          title: 所在地
          description: P14_004。市区町村名を省いた所在地
      - name: major_class_code
        meta:
          title: 福祉施設大分類コード
          description: P14_005（保護施設=01、老人福祉施設=02、障害者支援施設等=03、身体障害者社会参加支援施設=04、児童福祉施設等=05、母子・父子福祉施設=06、その他の社会福祉施設等=99）
      - name: major_class
        meta:
          title: 福祉施設大分類
      - name: middle_class_code
        meta:
          title: 福祉施設中分類コード
          description: P14_006。施設の用途による中分類
      - name: middle_class
        meta:
          title: 福祉施設中分類
      - name: minor_class_code
        meta:
          title: 福祉施設小分類コード
          description: P14_007。施設の用途による小分類
      - name: minor_class
        meta:
          title: 福祉施設小分類
          description: 公式コードリストで名称が定義されない中間ノードは NULL
      - name: institution_name
        meta:
          title: 名称
          description: 当該施設の正式名称
      - name: administrator_code
        meta:
          title: 管理者コード
          description: P14_009（その他=0、国=1、都道府県=2、市区町村=3、民間=4、法人=5、不明=9）。製品仕様書 第2.1版の定義に従う
      - name: administrator
        meta:
          title: 管理者
      - name: position_accuracy_code
        meta:
          title: 位置正確度コード
          description: P14_010（位置特定=1、小字・街区レベル=2、大字・町丁目レベル=3、市区町村レベル=4、都道府県レベル=5。2〜5 は代表点）
      - name: position_accuracy
        meta:
          title: 位置正確度
      - name: geometry
        meta:
          title: 福祉施設ポイント
          description: "CRS: EPSG:6668 (JGD2011)"
