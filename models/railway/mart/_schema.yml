version: 2

_meta: &meta
  source_url: "https://nlftp.mlit.go.jp/ksj/gml/datalist/KsjTmplt-N02-2024.html"
  published: true
  tags: ["国土数値情報", "鉄道", "GIS"]

models:
  - name: railway_line
    description: |
      鉄道路線（路線名・運営会社・鉄道区分単位）のラインジオメトリ。
      国土数値情報 N02（令和6年）の路線区間を路線単位に ST_Union_Agg で集約。
    access: public
    config:
      meta:
        <<: *meta
        title: "鉄道路線"
    columns:
      - name: railway_class_code
        meta:
          title: 鉄道区分コード
          description: N02_001（普通鉄道JR=11、普通鉄道=12、軌道=21 など）
      - name: railway_class
        meta:
          title: 鉄道区分
      - name: operator_type_code
        meta:
          title: 事業者種別コード
          description: N02_002（JRの新幹線=1、JR在来線=2、公営鉄道=3、民営鉄道=4、第三セクター=5）
      - name: operator_type
        meta:
          title: 事業者種別
      - name: line_name
        meta:
          title: 路線名
      - name: operator
        meta:
          title: 運営会社
      - name: geometry
        meta:
          title: 路線ライン
          description: "CRS: EPSG:6668 (JGD2011)"

  - name: station
    description: |
      駅の代表点（ポイント）。
      国土数値情報 N02（令和6年）の駅データ。駅は元データでは軌道区間のラインで表現されるため、
      その重心を代表点とした。同一駅が複数路線に属する場合は路線ごとに行が分かれる。
    access: public
    config:
      meta:
        <<: *meta
        title: "駅"
    columns:
      - name: railway_class_code
        meta:
          title: 鉄道区分コード
          description: N02_001
      - name: railway_class
        meta:
          title: 鉄道区分
      - name: operator_type_code
        meta:
          title: 事業者種別コード
          description: N02_002
      - name: operator_type
        meta:
          title: 事業者種別
      - name: line_name
        meta:
          title: 路線名
      - name: operator
        meta:
          title: 運営会社
      - name: station_name
        meta:
          title: 駅名
      - name: station_code
        meta:
          title: 駅コード
          description: N02_005c。駅を一意に識別する番号
      - name: station_group_code
        meta:
          title: 駅グループコード
          description: N02_005g。乗換可能な同一駅グループを束ねるコード
      - name: geometry
        meta:
          title: 駅ポイント
          description: "CRS: EPSG:6668 (JGD2011)。軌道区間ラインの重心"
